<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Dashboard Manager</h1>
    <div class="user-info">
      <span>Bonjour {{ nom }} {{ prenom }}</span>
      <button (click)="logout()">Se déconnecter</button>
    </div>
  </header>

  <main class="dashboard-content">
    <div class="card" routerLink="/manager/event-form">
      <h2>➕ Créer un événement</h2>
      <p>Ajouter un nouveau concert</p>
    </div>
    <div class="card" routerLink="/manager/event-list">
      <h2>📋 Mes événements</h2>
      <p>Voir et gérer mes concerts</p>
    </div>
  </main>
</div>
